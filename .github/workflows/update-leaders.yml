name: Update Weekly Leaders


on:
  schedule:
    - cron: "/5 * * * *"
  workflow_dispatch:


permissions:
  contents: write


concurrency:
  group: update-leaders-main
  cancel-in-progress: true


jobs:
  update-leaders:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20


      - name: Sync latest main
        run: |
          git pull --rebase origin main


      - name: Run weekly leaders script
        run: node weekly-leaders.js


      - name: Commit updated leaders data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"


          if [[ -n "$(git status --porcelain data/weekly-leaders.json)" ]]; then
            git add data/weekly-leaders.json
            git commit -m "Update weekly leaders data"
            git push
          else
            echo "No leaderboard changes to commit"
          fi

