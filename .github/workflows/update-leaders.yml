name: Update Weekly Leaders


on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:


permissions:
  contents: write


jobs:
  update-leaders:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20


      - name: Run weekly leaders script
        run: node weekly-leaders.js


      - name: Commit updated leaders data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"


          git pull --rebase origin main


          git add data/weekly-leaders.json
          git commit -m "Update weekly leaders data" || echo "No changes"


          git push

